<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>X AUTO — Settings</title>
    <style>
      body {
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 16px;
        min-width: 320px;
      }
      label { display: block; font-weight: 600; margin-bottom: 4px; }
      input[type="text"] {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box;
      }
      button {
        margin-top: 12px;
        padding: 6px 14px;
        background: #1d9bf0;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
      }
      .status { margin-top: 8px; font-size: 12px; color: #15803d; }
    </style>
  </head>
  <body>
    <label for="server">Local server URL</label>
    <input id="server" type="text" placeholder="http://127.0.0.1:8765" />
    <button id="save">Save</button>
    <div id="status" class="status"></div>
    <script src="options.js"></script>
  </body>
</html>
